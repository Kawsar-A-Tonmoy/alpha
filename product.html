<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product - The Geek Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script type="module" src="script.js"></script>
</head>
<body class="bg-background text-on-background font-body antialiased">
  <!-- Navigation - Copy from index.html -->

  <main class="pt-24 pb-16 px-4 md:px-8 max-w-[1440px] mx-auto">
    <div id="product-section" class="grid grid-cols-1 lg:grid-cols-12 gap-12 mb-24">
      <!-- Image Gallery -->
      <div class="lg:col-span-7 flex flex-col gap-4">
        <div class="aspect-[4/3] rounded-xl overflow-hidden bg-surface-container-low relative group">
          <img id="main-image" class="w-full h-full object-cover" alt="">
        </div>
        <div class="grid grid-cols-3 gap-4" id="thumbnail-gallery"></div>
      </div>

      <!-- Purchase Details -->
      <div class="lg:col-span-5 flex flex-col">
        <h1 id="product-name" class="text-4xl md:text-5xl font-headline font-bold tracking-tighter text-on-surface mb-6"></h1>
        <div id="product-price" class="flex items-baseline gap-2 mb-8 text-3xl font-headline font-semibold text-secondary"></div>
        <p id="product-detailed-desc" class="text-on-surface-variant leading-relaxed mb-8"></p>

        <div class="flex gap-4 mt-auto">
          <button onclick="addToCartFromDetail()" class="flex-1 py-4 bg-gradient-to-r from-primary to-primary-container text-on-primary-container font-headline font-bold rounded-lg">Add to Cart</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    async function loadProductDetail() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (!id) return alert("No product ID found");

      const products = await loadProducts(); // from script.js
      const p = products.find(x => x.id === id);
      if (!p) return alert("Product not found");

      document.getElementById('product-name').textContent = p.name;
      document.getElementById('main-image').src = p.images?.[0] || '';
      document.getElementById('product-detailed-desc').innerHTML = p.detailedDescription || p.description || 'No description available.';

      const finalPrice = Number(p.discount) > 0 ? Number(p.price) - Number(p.discount) : Number(p.price);
      document.getElementById('product-price').innerHTML = `৳${finalPrice} ${Number(p.discount)>0 ? `<span class="line-through text-sm text-on-surface-variant">৳${p.price}</span>` : ''}`;
    }

    function addToCartFromDetail() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (id) addToCart(id);
    }

    window.onload = loadProductDetail;
  </script>
</body>
</html>
