<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - The Geek Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script type="module" src="script.js"></script>
  <script>
    // Tailwind config - same as index.html
    tailwind.config = { /* paste the same config as in index.html */ };
  </script>
</head>
<body class="bg-background text-on-background font-body antialiased">
<nav class="fixed top-0 w-full z-50 glass-nav shadow-[0_20px_40px_rgba(0,0,0,0.4)]">
    <div class="max-w-[1440px] mx-auto flex items-center justify-between px-8 py-4">
      <a href="index.html" class="text-2xl font-bold tracking-tighter text-[#ecb2ff] font-headline">The Geek Shop</a>
      <div class="hidden md:flex items-center gap-8 font-headline tracking-tight">
        <a href="products.html" class="text-gray-400 hover:text-white transition-colors">Keyboards & Mouse</a>
        <a href="products.html?category=Switches" class="text-gray-400 hover:text-white transition-colors">Switches</a>
        <a href="products.html?category=Keycaps" class="text-[#ecb2ff] border-b-2 border-[#ecb2ff] pb-1">Keycaps</a>
        <a href="products.html?category=Accessories and Collectables" class="text-gray-400 hover:text-white transition-colors">Accessories</a>
        <a href="products.html?category=Accessories and Collectables" class="text-gray-400 hover:text-white transition-colors">Collectibles</a>
      </div>
      <div class="flex items-center gap-6">
        <button id="cart-link" class="hover:text-[#b9f1ff] transition-colors">
          <span class="material-symbols-outlined text-3xl">shopping_cart</span>
        </button>
        <a href="status.html" class="hover:text-[#b9f1ff] transition-colors">
          <span class="material-symbols-outlined text-3xl">receipt_long</span>
        </a>
      </div>
    </div>
  </nav>
  <main class="pt-24 pb-20 px-8 max-w-[1440px] mx-auto">
    <div class="flex flex-col lg:flex-row gap-12">
      <!-- Filters -->
      <aside class="w-full lg:w-72 space-y-10">
        <h2 class="text-2xl font-headline font-bold">Filters</h2>
        <!-- Add your filter sections here (price, color, specs, etc.) -->
        <!-- JS will handle dynamic population if needed -->
      </aside>

      <!-- Product Grid -->
      <div class="flex-1">
        <div id="product-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
      </div>
    </div>
  </main>

    <div id="cart-slider" class="fixed top-0 right-[-400px] w-96 h-full bg-surface-container shadow-2xl transition-all duration-300 z-[200] overflow-y-auto p-6">
    <button id="close-cart" class="absolute top-4 right-4 text-4xl text-on-surface-variant hover:text-white">×</button>
    <h2 class="text-2xl font-headline font-bold mb-6">Your Cart</h2>
    <div id="cart-items" class="space-y-6"></div>
    <div id="cart-total" class="text-2xl font-bold mt-8 border-t border-outline-variant/20 pt-6"></div>
    <button id="checkout-cart" class="w-full kinetic-gradient text-white py-4 rounded-2xl font-bold mt-6">Checkout</button>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
