<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Status - The Geek Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script type="module" src="script.js"></script>
</head>
<body class="bg-background text-on-background font-body antialiased">
<nav class="fixed top-0 w-full z-50 glass-nav shadow-[0_20px_40px_rgba(0,0,0,0.4)]">
    <div class="max-w-[1440px] mx-auto flex items-center justify-between px-8 py-4">
      <a href="index.html" class="text-2xl font-bold tracking-tighter text-[#ecb2ff] font-headline">The Geek Shop</a>
      <div class="hidden md:flex items-center gap-8 font-headline tracking-tight">
        <a href="products.html" class="text-gray-400 hover:text-white transition-colors">Keyboards & Mouse</a>
        <a href="products.html?category=Switches" class="text-gray-400 hover:text-white transition-colors">Switches</a>
        <a href="products.html?category=Keycaps" class="text-[#ecb2ff] border-b-2 border-[#ecb2ff] pb-1">Keycaps</a>
        <a href="products.html?category=Accessories and Collectables" class="text-gray-400 hover:text-white transition-colors">Accessories</a>
        <a href="products.html?category=Accessories and Collectables" class="text-gray-400 hover:text-white transition-colors">Collectibles</a>
      </div>
      <div class="flex items-center gap-6">
        <button id="cart-link" class="hover:text-[#b9f1ff] transition-colors">
          <span class="material-symbols-outlined text-3xl">shopping_cart</span>
        </button>
        <a href="status.html" class="hover:text-[#b9f1ff] transition-colors">
          <span class="material-symbols-outlined text-3xl">receipt_long</span>
        </a>
      </div>
    </div>
  </nav>

  <main class="pt-24 px-8 max-w-[1440px] mx-auto">
    <h1 class="text-5xl font-headline font-bold tracking-tighter mb-8">Order Status</h1>
    <form id="status-form" class="max-w-md">
      <input id="phone-input" type="tel" placeholder="01XXXXXXXXX" 
             class="w-full bg-surface-container-lowest rounded-2xl px-6 py-4 text-lg focus:ring-2 focus:ring-primary outline-none" required>
      <button type="submit" class="kinetic-gradient w-full mt-6 py-4 rounded-2xl font-bold text-white text-lg">
        Check Orders
      </button>
    </form>
    <div id="order-result" class="mt-12"></div>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
